<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with subtle gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  <!-- B letter -->
  <text x="32" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="white">B</text>
  <!-- 1 with accent color -->
  <text x="62" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#10b981">1</text>
  <!-- Small underline accent -->
  <rect x="20" y="80" width="60" height="3" rx="1.5" fill="#10b981" opacity="0.6"/>
</svg>
